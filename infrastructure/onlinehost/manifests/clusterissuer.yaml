apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: __CERT_MANAGER_ISSUER_NAME__
spec:
  acme:
    email: __CERT_MANAGER_EMAIL__
    server: __CERT_MANAGER_ACME_SERVER__
    privateKeySecretRef:
      name: __CERT_MANAGER_ISSUER_NAME__-acme-account-key
    solvers:
      - http01:
          ingress:
            class: __INGRESS_CLASS__