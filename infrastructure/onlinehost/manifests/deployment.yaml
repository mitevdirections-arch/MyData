apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydata-api
  namespace: __NAMESPACE__
  labels:
    app: mydata-api
spec:
  replicas: __REPLICAS__
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mydata-api
  template:
    metadata:
      labels:
        app: mydata-api
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["py"]
          args:
            - "-m"
            - "uvicorn"
            - "app.main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8100"
            - "--workers"
            - "__UVICORN_WORKERS__"
            - "--log-level"
            - "warning"
          ports:
            - containerPort: 8100
              name: http
          envFrom:
            - configMapRef:
                name: mydata-api-config
            - secretRef:
                name: mydata-api-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz/db
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]